<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gastro Food - API Credentials</title>
  
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Configurações Premium do Tailwind -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            background: '#09090b', // Zinc 950
            surface: '#18181b', // Zinc 900
            surfaceHover: '#27272a', // Zinc 800
            primary: '#8b5cf6', // Violet 500
            primaryHover: '#7c3aed', // Violet 600
            danger: '#ef4444', // Red 500
          },
          animation: {
            'in-fade': 'fadeIn 0.4s ease-out forwards',
            'in-slide': 'slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>

  <!-- React e ReactDOM via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel para transpilar JSX no navegador -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Lucide Icons via CDN para React -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      background-color: #09090b;
      color: #fafafa;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    
    /* Efeito base para Glassmorphism */
    .glass-panel {
      background: rgba(24, 24, 27, 0.6);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
    }
    
    /* Scrollbar personalizada */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #09090b; 
    }
    ::-webkit-scrollbar-thumb {
      background: #3f3f46; 
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #52525b; 
    }
  </style>
</head>
<body class="min-h-screen bg-background text-zinc-100 overflow-x-hidden selection:bg-primary/30 relative">
  <!-- Efeitos de Fundo (Blur Orbs) -->
  <div class="fixed top-[-20%] left-[-10%] w-[50%] h-[50%] rounded-full bg-violet-600/20 blur-[120px] pointer-events-none z-[-1]"></div>
  <div class="fixed bottom-[-20%] right-[-10%] w-[50%] h-[50%] rounded-full bg-blue-600/10 blur-[120px] pointer-events-none z-[-1]"></div>

  <div id="root"></div>

  <script type="text/babel" src="/admin/app.jsx"></script>
</body>
</html>
